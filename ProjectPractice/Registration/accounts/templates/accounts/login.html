<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Platform Login</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f4f4f9; }
        .login-container { max-width: 400px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
        button:hover { background: #0056b3; }
        .errorlist { color: red; font-size: 14px; }
        .footer-link { margin-top: 20px; text-align: center; font-size: 14px; }
        .footer-link a { color: #007bff; text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Sign In</h2>
    <p>Use your email address and password to access your account.</p>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log In</button>
    </form>

    <p class="footer-link">Need an account? <a href="{% url 'register' %}">Register here</a></p>
</div>

</body>
</html>
