<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Platform Registration</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f4f4f9; }
        .register-container { max-width: 400px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        button { background: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
        button:hover { background: #0056b3; }
        .errorlist { color: red; font-size: 14px; }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Create Your Account</h2>
    
    <form method="POST">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit">Register Account</button>
    </form>

    <p style="margin-top: 20px; text-align: center; font-size: 14px;">
        Already have an account? <a href="{% url 'login' %}" style="color: #007bff; text-decoration: none;">Log in here</a>
    </p>
</div>

</body>
</html>
